<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modul 10 - AJAX | Deshan Rafif Alfarisi</title>
  <meta name="description" content="Tugas Modul 10 AJAX - Mengambil data dari server tanpa reload halaman menggunakan fetch API." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark:       #0d0f1a;
      --bg-card:       #13162a;
      --bg-card2:      #1a1e35;
      --accent:        #6c63ff;
      --accent2:       #a78bfa;
      --accent-glow:   rgba(108, 99, 255, 0.35);
      --green:         #34d399;
      --green-glow:    rgba(52, 211, 153, 0.25);
      --text-primary:  #e8eaf6;
      --text-secondary:#9da3c8;
      --border:        rgba(108, 99, 255, 0.18);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* ── Background decoration ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
    }

    /* ── Badge / tag ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent2);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 1.4rem;
    }
    .badge .dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.92rem;
      margin-bottom: 2.2rem;
      line-height: 1.6;
    }

    /* ── Button ── */
    #btn-tampilkan {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px 28px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
      width: 100%;
      justify-content: center;
      letter-spacing: 0.02em;
    }
    #btn-tampilkan:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }
    #btn-tampilkan:active:not(:disabled) {
      transform: translateY(0);
    }
    #btn-tampilkan:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* spinner icon inside button */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    .loading .btn-icon { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    /* ── Hasil Profil ── */
    #hasil-profil {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .placeholder-text {
      color: var(--text-secondary);
      font-size: 0.88rem;
      text-align: center;
      line-height: 1.7;
    }
    .placeholder-text span {
      display: block;
      font-size: 1.8rem;
      margin-bottom: 6px;
    }

    /* Profile result box */
    .profil-box {
      background: var(--bg-card2);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 16px;
      padding: 1.6rem;
      width: 100%;
      animation: fadeUp 0.4s ease both;
      box-shadow: 0 0 30px var(--green-glow);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profil-box .profil-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .profil-box .profil-label::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
    }

    .profil-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .profil-row:last-child { border-bottom: none; }

    .profil-row .key {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
      min-width: 90px;
    }
    .profil-row .sep {
      color: rgba(255,255,255,0.2);
      font-weight: 300;
    }
    .profil-row .val {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* raw format line */
    .raw-format {
      margin-top: 1.2rem;
      padding: 10px 14px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--accent2);
      font-family: monospace;
      word-break: break-all;
      line-height: 1.6;
      border: 1px solid rgba(108,99,255,0.12);
    }

    /* ── Error state ── */
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      width: 100%;
      color: #fca5a5;
      font-size: 0.88rem;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.3s ease both;
    }

    /* ── Footer note ── */
    .footer-note {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.6;
      z-index: 1;
    }
    .footer-note strong { color: var(--accent2); }
  </style>
</head>
<body>

  <div class="card">
    <div class="badge"><span class="dot"></span> Modul 10 AJAX</div>

    <h1>Data Profil via AJAX</h1>
    <p class="subtitle">
      Klik tombol di bawah untuk mengambil data dari <code>data.php</code>
      menggunakan <strong>fetch API</strong> tanpa me-reload halaman.
    </p>

    <button id="btn-tampilkan">
      <span class="btn-icon">⚡</span>
      <div class="spinner"></div>
      Tampilkan Profil
    </button>

    <hr class="divider" />

    <div id="hasil-profil">
      <div class="placeholder-text">
        <span>📂</span>
        Data belum dimuat. Klik tombol di atas untuk memulai.
      </div>
    </div>
  </div>

  <p class="footer-note">
    <strong>2311102326</strong> · Deshan Rafif Alfarisi ·
    Tugas Pemrograman Web Modul 10
  </p>

  <script>
    const btn    = document.getElementById('btn-tampilkan');
    const output = document.getElementById('hasil-profil');

    btn.addEventListener('click', function () {
      // Loading state
      btn.disabled = true;
      btn.classList.add('loading');
      btn.querySelector('button > span:not(.spinner)');
      output.innerHTML = '';

      fetch('data.php')
        .then(function (response) {
          if (!response.ok) {
            throw new Error('HTTP error — status: ' + response.status);
          }
          return response.json();
        })
        .then(function (data) {
          // Build raw format string sesuai instruksi
          const rawLine =
            'Nama: ' + data.nama +
            ' | Pekerjaan: ' + data.pekerjaan +
            ' | Lokasi: ' + data.lokasi;

          output.innerHTML = `
            <div class="profil-box">
              <div class="profil-label">Data berhasil dimuat dari server</div>
              <div class="profil-row">
                <span class="key">Nama</span>
                <span class="sep">|</span>
                <span class="val">${data.nama}</span>
              </div>
              <div class="profil-row">
                <span class="key">Pekerjaan</span>
                <span class="sep">|</span>
                <span class="val">${data.pekerjaan}</span>
              </div>
              <div class="profil-row">
                <span class="key">Lokasi</span>
                <span class="sep">|</span>
                <span class="val">${data.lokasi}</span>
              </div>
              <div class="profil-row">
                <span class="key">NIM</span>
                <span class="sep">|</span>
                <span class="val">${data.nim}</span>
              </div>
              <div class="profil-row">
                <span class="key">Modul</span>
                <span class="sep">|</span>
                <span class="val">${data.modul}</span>
              </div>
              <div class="raw-format">${rawLine}</div>
            </div>`;
        })
        .catch(function (err) {
          output.innerHTML = `
            <div class="error-box">
              <span>⚠️</span>
              <div>
                <strong>Gagal mengambil data.</strong><br/>
                Pastikan file <code>data.php</code> dijalankan di server PHP (XAMPP/WAMP/Laragon).<br/>
                <small style="opacity:.7;">${err.message}</small>
              </div>
            </div>`;
        })
        .finally(function () {
          btn.disabled = false;
          btn.classList.remove('loading');
        });
    });
  </script>

</body>
</html>
